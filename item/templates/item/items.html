{% extends 'core/base.html' %}

{% block title %} Items {% endblock %}

{% block content %}
    <div class="pb-6 grid grid-cols-4 gap-4 bg-gray-100">
        <div class="col-span-2 sm:col-span-1 rounded-xl px-4">
            <form method="get" action="{% url 'item:items' %}">
                <input name="query" class="w-full mt-3 py-2 px-3 sm:py-4 sm:px-8 border rounded-xl" type="text" value="{{ query }}" placeholder="Search...">

                <button class="mt-1 sm:mt-2 py-2 px-5 sm:px-8 text-base sm:text-lg text-white rounded-xl sm:rounded-xl bg-teal-500 hover:bg-teal-700">Go</button>
            </form>

            <hr class="my-6">

            <p class="font-semibold">Categories</p>

            <ul>
                {% for category in categories %}
                    <li class="py-2 px-2 rounded-xl {% if category.id == category_id %} bg-gray-200 {% endif %}">
                        <a href="{% url 'item:items' %}?query={{ query }}&category={{ category.id }}">{{ category.name }}</a>
                    </li>
                {% endfor %}
            </ul>

            <hr class="my-6">

            <p class="font-semibold">Clear Filters</p>

            <ul>
                <li><a href="{% url 'item:items' %}" class="mt-2 py-2 px-5 sm:px-8 inline-block bg-yellow-500 text-base sm:text-lg rounded-xl text-white">Clear</a></li>
            </ul>

        </div>

        <div class="mt-3 col-span-2 sm:col-span-3">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                {% for item in items %}
                    <div>
                        <a href="{% url 'item:detail' item.id %}">
                            <div>
                                <!--<a href="{{ item.image_credit}}">-->
                                <img src="{{ item.image.url }}" class="rounded-t-xl h-full w-full object-cover">
                                <!--</a>-->
                            </div>

                            <div class="p-4 bg-white rounded-b-xl">
                                <h2 class="text-l">{{ item.name }}</h2>
                                <!--<p class="text-sm">{{ item.description }}</p>-->
                                <p class="mb-3 text-gray-500">$ {{ item.price }}</p>
                            </div>
                        </a>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
{% endblock %}
